name: Releases
on:
  release:
    types:
      - created

jobs:
  build:
    uses: ./.github/workflows/binaries.yaml
    with:
      build_binaries: true
  upload-binaries:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
    strategy:
      matrix:
        include:
          - platform: linux-amd64
          - platform: linux-arm64
          - platform: darwin-arm64
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: visus-${{ matrix.platform }}
      - name: Upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name }}
          mv "visus-${{ matrix.platform }}.tgz" "visus-${TAG}-${{ matrix.platform }}.tgz"
          gh -R ${{ github.repository }} release upload "${TAG}" "visus-${TAG}-${{ matrix.platform }}.tgz"
