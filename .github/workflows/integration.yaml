name: Integration Tests
on:
  push:
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: v26.1
            cockroachdb: v26.1
          - id: v25.4
            cockroachdb: v25.4
          - id: v24.3
            cockroachdb: v24.3
    steps:
      - uses: actions/checkout@v4
      - name: Start CockroachDB
        working-directory: .github
        run: docker compose --profile ${{ matrix.cockroachdb }} up -d
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Wait for CockroachDB
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 26257 && break
            sleep 1
          done
      - name: Integration Tests
        run: go test -v -race -tags integration -run TestIntegration ./internal/store/...
        env:
          VISUS_TEST_DB_URL: "postgresql://root@localhost:26257/defaultdb?sslmode=disable"
