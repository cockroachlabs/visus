services:
  cockroachdb-v24.3:
    profiles: ["v24.3"]
    image: cockroachdb/cockroach:latest-v24.3
    entrypoint: /cockroach/cockroach
    command: start-single-node --insecure --store type=mem,size=2G
    network_mode: host

  cockroachdb-v25.4:
    profiles: ["v25.4"]
    image: cockroachdb/cockroach:latest-v25.4
    entrypoint: /cockroach/cockroach
    command: start-single-node --insecure --store type=mem,size=2G
    network_mode: host

  cockroachdb-v26.1:
    profiles: ["v26.1"]
    image: cockroachdb/cockroach:latest-v26.1
    entrypoint: /cockroach/cockroach
    command: start-single-node --insecure --store type=mem,size=2G
    network_mode: host
